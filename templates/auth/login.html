{% extends "base.html" %}

{% block title %}Connexion - StageHub{% endblock %}

{% block content %}
<div class="auth-shell section-panel">
    <h1 class="h3 mb-3">Connexion</h1>
    <form method="post" class="compact-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex flex-wrap align-items-center gap-2">
            <button class="btn btn-primary" type="submit">
                <i class="bi bi-box-arrow-in-right"></i> Connexion
            </button>
            <a href="{% url 'password_reset' %}" class="btn btn-link">Mot de passe oublie ?</a>
        </div>
    </form>
</div>
{% endblock %}
