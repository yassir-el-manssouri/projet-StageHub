{% extends "base.html" %}

{% block title %}Nouveau mot de passe - StageHub{% endblock %}

{% block content %}
<div class="auth-shell section-panel">
    <h1 class="h3 mb-3">Nouveau mot de passe</h1>
    {% if validlink %}
        <form method="post" class="compact-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Enregistrer</button>
        </form>
    {% else %}
        <p class="text-muted">Ce lien est invalide ou expire.</p>
        <a href="{% url 'password_reset' %}" class="btn btn-outline-primary">Demander un nouveau lien</a>
    {% endif %}
</div>
{% endblock %}
